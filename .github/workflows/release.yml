name: Build and Release Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.1)'
        required: true
        default: 'v1.0.1'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --name "WorkTimeTracker" `
            --onefile `
            --windowed `
            --add-data "config.yaml;." `
            main.py

      - name: Determine tag name
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: WorkTimeTracker ${{ steps.tag.outputs.name }}
          body: |
            ## WorkTimeTracker ${{ steps.tag.outputs.name }}

            ### 下载
            - `WorkTimeTracker.exe` - Windows 可执行文件（双击运行，无需安装 Python）

            ### 使用说明
            1. 下载 `WorkTimeTracker.exe`
            2. 在同目录放置 `config.yaml`（配置 Notion Token 和数据库 ID）
            3. 双击运行
          files: dist/WorkTimeTracker.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
